# CodeRed NDR — universal systemd hardening drop-in.
# Installed under /etc/systemd/system/<codered-*>.service.d/hardening.conf
# These three directives are safe for every codered-* service and shrink the
# blast radius of an exploit in any one component. More aggressive directives
# (ProtectSystem=strict, ReadWritePaths=..., CapabilityBoundingSet=...) are
# left out here because they need per-service tuning — apply via additional
# drop-ins in the same .d/ directory if desired.

[Service]
NoNewPrivileges=yes
PrivateTmp=yes
ProtectHome=yes
